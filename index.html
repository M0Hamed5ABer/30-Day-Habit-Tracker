<!doctype html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>30-Day Habit Tracker</title>
    <link rel="shortcut icon" href="time-left.ico" type="image/x-icon" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: system-ui, sans-serif;
        background: #f5f5f2;
        color: #1a1a18;
        padding: 1.5rem;
      }
      .wrap {
        max-width: 1200px;
        margin: 0 auto;
      }
      .main-title {
        font-size: 20px;
        font-weight: 500;
        margin-bottom: 4px;
      }
      .subtitle {
        font-size: 13px;
        color: #666;
        margin-bottom: 1.25rem;
      }
      .task-input-row {
        display: flex;
        gap: 8px;
        margin-bottom: 1rem;
        align-items: center;
      }
      .task-input-row input {
        flex: 1;
        font-size: 14px;
        padding: 8px 12px;
        border: 1px solid #ccc;
        border-radius: 8px;
        background: #fff;
        color: #1a1a18;
        outline: none;
      }
      .task-input-row input:focus {
        border-color: #888;
      }
      .btn {
        font-size: 13px;
        padding: 8px 14px;
        cursor: pointer;
        border: 1px solid #bbb;
        border-radius: 8px;
        background: #fff;
        color: #1a1a18;
        white-space: nowrap;
        display: inline-flex;
        align-items: center;
        gap: 5px;
      }
      .btn:hover {
        background: #f0f0ec;
      }
      .btn.green {
        border-color: #639922;
        color: #3b6d11;
        background: #eaf3de;
      }
      .btn.green:hover {
        background: #d4ebbb;
      }
      .btn.blue {
        border-color: #378add;
        color: #185fa5;
        background: #e6f1fb;
      }
      .btn.blue:hover {
        background: #cce4f8;
      }
      .btn.amber {
        border-color: #ba7517;
        color: #854f0b;
        background: #faeeda;
      }
      .btn.amber:hover {
        background: #f5ddb0;
      }
      .action-row {
        display: flex;
        gap: 8px;
        margin-bottom: 1.5rem;
        flex-wrap: wrap;
      }
      .toast {
        position: fixed;
        bottom: 1.5rem;
        left: 50%;
        transform: translateX(-50%);
        background: #1a1a18;
        color: #fff;
        padding: 10px 20px;
        border-radius: 8px;
        font-size: 13px;
        opacity: 0;
        transition: opacity 0.3s;
        pointer-events: none;
        z-index: 99;
      }
      .toast.show {
        opacity: 1;
      }
      .stats-row {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 10px;
        margin-bottom: 1.5rem;
      }
      .stat-card {
        background: #eeeee8;
        border-radius: 8px;
        padding: 10px 14px;
        text-align: center;
      }
      .stat-label {
        font-size: 12px;
        color: #666;
        margin-bottom: 4px;
      }
      .stat-val {
        font-size: 22px;
        font-weight: 500;
      }
      .stat-val.green {
        color: #3b6d11;
      }
      .stat-val.amber {
        color: #854f0b;
      }
      .table-scroll {
        overflow-x: auto;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 12px;
        table-layout: fixed;
      }
      thead th {
        background: #eeeee8;
        color: #555;
        font-weight: 500;
        padding: 7px 3px;
        text-align: center;
        border-bottom: 1px solid #ddd;
        position: sticky;
        top: 0;
      }
      thead th.task-col {
        text-align: left;
        padding-left: 10px;
        width: 130px;
        font-size: 11px;
      }
      thead th.pct-col {
        width: 70px;
        color: #1a1a18;
      }
      thead th.del-col {
        width: 32px;
      }
      tbody tr:hover {
        background: #f0f0ec;
      }
      tbody td {
        padding: 5px 2px;
        text-align: center;
        border-bottom: 1px solid #e8e8e4;
      }
      tbody td.task-name {
        text-align: left;
        padding-left: 10px;
        font-size: 12px;
        font-weight: 500;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        max-width: 130px;
      }
      .day-btn {
        width: 22px;
        height: 22px;
        border-radius: 50%;
        border: 1px solid #ccc;
        background: transparent;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        font-size: 13px;
        transition: background 0.15s;
      }
      .day-btn.done {
        background: #eaf3de;
        border-color: #639922;
        color: #3b6d11;
      }
      .day-btn.missed {
        background: #fcebeb;
        border-color: #e24b4a;
        color: #a32d2d;
      }
      .day-btn:hover:not(.done):not(.missed) {
        background: #e8f0fb;
      }
      .pct-cell {
        padding: 5px 6px;
      }
      .pct-val {
        font-weight: 500;
        font-size: 13px;
      }
      .pct-bar-wrap {
        width: 100%;
        height: 5px;
        background: #ddd;
        border-radius: 3px;
        margin-top: 3px;
      }
      .pct-bar {
        height: 5px;
        border-radius: 3px;
      }
      .remove-btn {
        background: transparent;
        border: none;
        cursor: pointer;
        color: #999;
        font-size: 15px;
        padding: 2px 5px;
      }
      .remove-btn:hover {
        color: #a32d2d;
      }
      .no-tasks {
        text-align: center;
        color: #888;
        padding: 2rem;
        font-size: 14px;
      }
      .save-info {
        font-size: 11px;
        color: #999;
        margin-top: 4px;
      }

      .drag-handle {
        cursor: grab;
        font-size: 18px;
        color: #777;
        user-select: none;
      }

      .drag-handle:active {
        cursor: grabbing;
      }

      tr[draggable="true"] {
        cursor: move;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="main-title">30-Day Habit Tracker</div>
      <div class="subtitle" id="date-range">Loading...</div>

      <div class="task-input-row">
        <input
          type="text"
          id="task-input"
          placeholder="Enter habit name..."
          maxlength="40"
        />
        <button class="btn" onclick="addTask()">+ Add Habit</button>
      </div>

      <div class="action-row">
        <button class="btn green" onclick="saveData()">Save</button>
        <button class="btn blue" onclick="exportExcel()">Export</button>
        <button class="btn amber" onclick="doneCycle()">Done</button>
        <span class="save-info" id="save-info"></span>
      </div>

      <div class="stats-row">
        <div class="stat-card">
          <div class="stat-label">Days Logged</div>
          <div class="stat-val" id="stat-total">0</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Completed ✓</div>
          <div class="stat-val green" id="stat-done">0</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Completion Rate</div>
          <div class="stat-val amber" id="stat-pct">0%</div>
        </div>
      </div>

      <div class="table-scroll">
        <table id="tracker-table">
          <thead id="table-head"></thead>
          <tbody id="table-body"></tbody>
        </table>
      </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
      const DAYS = 30;
      const STORAGE_KEY = "habit_tracker_data";
      let tasks = [];
      let draggedTaskIndex = null;

      function dragStart(event, index) {
        draggedTaskIndex = index;
      }

      function dragOver(event) {
        event.preventDefault();
      }

      function dropTask(event, targetIndex) {
        event.preventDefault();

        if (draggedTaskIndex === null || draggedTaskIndex === targetIndex)
          return;

        const draggedTask = tasks[draggedTaskIndex];

        tasks.splice(draggedTaskIndex, 1);
        tasks.splice(targetIndex, 0, draggedTask);

        draggedTaskIndex = null;

        renderBody();
        saveData();
      }

      function getDayLabels() {
        const saved = loadMeta();
        const startDate =
          saved && saved.startDate ? new Date(saved.startDate) : new Date();
        startDate.setHours(0, 0, 0, 0);
        const labels = [];
        for (let i = 0; i < DAYS; i++) {
          const d = new Date(startDate);
          d.setDate(startDate.getDate() + i);
          labels.push({ day: d.getDate(), month: d.getMonth() + 1, date: d });
        }
        return labels;
      }

      let dayLabels = [];

      function loadMeta() {
        try {
          const raw = localStorage.getItem(STORAGE_KEY);
          return raw ? JSON.parse(raw) : null;
        } catch {
          return null;
        }
      }

      function saveData() {
        const data = {
          startDate: dayLabels[0].date.toISOString(),
          savedAt: new Date().toISOString(),
          tasks,
        };
        try {
          localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
          showToast("✅ Progress saved!");
          updateSaveInfo();
        } catch {
          showToast("❌ Could not save — storage may be full.");
        }
      }

      function loadData() {
        const data = loadMeta();
        if (data && data.tasks) {
          tasks = data.tasks;
          showToast("📂 Data loaded from last session");
        }
      }

      function doneCycle() {
        if (
          !confirm(
            "Start a new 30-day cycle? Habits will stay, but progress will reset.",
          )
        )
          return;

        // تصفير الأيام بدون حذف العادات
        tasks.forEach((task) => {
          task.days = Array(DAYS).fill(null);
        });

        // بدء 30 يوم جديدة من اليوم
        const newStart = new Date();
        newStart.setHours(0, 0, 0, 0);

        dayLabels = [];
        for (let i = 0; i < DAYS; i++) {
          const d = new Date(newStart);
          d.setDate(newStart.getDate() + i);
          dayLabels.push({
            day: d.getDate(),
            month: d.getMonth() + 1,
            date: d,
          });
        }

        // حفظ البيانات الجديدة
        saveData();

        // إعادة رسم الجدول والتواريخ
        setDateRange();
        renderHead();
        renderBody();

        showToast("✅ New 30-day cycle started!");
      }

      function updateSaveInfo() {
        const data = loadMeta();
        const el = document.getElementById("save-info");
        if (data && data.savedAt) {
          const d = new Date(data.savedAt);
          el.textContent =
            "Last saved: " +
            d.toLocaleDateString("en-US", { month: "short", day: "numeric" }) +
            " at " +
            d.toLocaleTimeString("en-US", {
              hour: "2-digit",
              minute: "2-digit",
            });
        } else {
          el.textContent = "Not saved yet";
        }
      }

      function showToast(msg) {
        const t = document.getElementById("toast");
        t.textContent = msg;
        t.classList.add("show");
        setTimeout(() => t.classList.remove("show"), 2500);
      }

      function setDateRange() {
        const first = dayLabels[0].date;
        const last = dayLabels[DAYS - 1].date;
        const fmt = (d) =>
          d.toLocaleDateString("en-US", {
            day: "numeric",
            month: "short",
            year: "numeric",
          });
        document.getElementById("date-range").textContent =
          fmt(first) + " — " + fmt(last);
      }

      function renderHead() {
        const head = document.getElementById("table-head");
        let html =
          '<tr><th style="width:32px"></th><th class="task-col">Habit</th>';
        for (let i = 0; i < DAYS; i++) {
          html += `<th style="width:26px">${dayLabels[i].day}<br><span style="font-size:9px;font-weight:400">${dayLabels[i].month}</span></th>`;
        }
        html += '<th class="pct-col">Rate</th><th class="del-col"></th></tr>';
        head.innerHTML = html;
      }

      function calcPct(task) {
        const filled = task.days.filter((d) => d !== null).length;
        if (filled === 0) return 0;
        const done = task.days.filter((d) => d === true).length;
        return Math.round((done / filled) * 100);
      }

      function renderBody() {
        const body = document.getElementById("table-body");
        if (tasks.length === 0) {
          body.innerHTML = `<tr><td colspan="${DAYS + 4}" class="no-tasks">Add a habit above to get started 👆</td></tr>`;
          updateStats();
          return;
        }
        let html = "";
        tasks.forEach((task, ti) => {
          const pct = calcPct(task);
          const barColor =
            pct >= 70 ? "#639922" : pct >= 40 ? "#BA7517" : "#E24B4A";
          html += `<tr
    ondragover="dragOver(event)"
    ondrop="dropTask(event, ${ti})">`;

          html += `
<td>
  <span
    class="drag-handle"
    draggable="true"
    ondragstart="dragStart(event, ${ti})"
    title="Drag to reorder">
    ☰
  </span>
</td>`;

          html += `<td class="task-name" title="${task.name}">${task.name}</td>`;
          for (let d = 0; d < DAYS; d++) {
            const state = task.days[d];
            let cls = "day-btn";
            let icon = "";
            if (state === true) {
              cls += " done";
              icon = "✓";
            } else if (state === false) {
              cls += " missed";
              icon = "✗";
            }
            html += `<td><button class="${cls}" onclick="toggle(${ti},${d})" title="Day ${d + 1}">${icon}</button></td>`;
          }
          html += `<td class="pct-cell">
      <div class="pct-val" style="color:${barColor}">${pct}%</div>
      <div class="pct-bar-wrap"><div class="pct-bar" style="width:${pct}%;background:${barColor}"></div></div>
    </td>`;
          html += `<td><button class="remove-btn" onclick="removeTask(${ti})" title="Delete">🗑</button></td>`;
          html += "</tr>";
        });
        body.innerHTML = html;
        updateStats();
      }

      function toggle(ti, d) {
        const cur = tasks[ti].days[d];
        tasks[ti].days[d] = cur === null ? true : cur === true ? false : null;
        renderBody();
      }

      function addTask() {
        const input = document.getElementById("task-input");
        const name = input.value.trim();
        if (!name) return;
        tasks.push({ name, days: Array(DAYS).fill(null) });
        input.value = "";
        renderBody();
      }

      function removeTask(ti) {
        tasks.splice(ti, 1);
        renderBody();
      }

      function updateStats() {
        let total = 0,
          done = 0;
        tasks.forEach((t) =>
          t.days.forEach((d) => {
            if (d !== null) {
              total++;
              if (d === true) done++;
            }
          }),
        );
        document.getElementById("stat-total").textContent = total;
        document.getElementById("stat-done").textContent = done;
        document.getElementById("stat-pct").textContent =
          total > 0 ? Math.round((done / total) * 100) + "%" : "0%";
      }

      function exportExcel() {
        if (tasks.length === 0) {
          showToast("⚠️ No habits to export.");
          return;
        }

        const header = [
          "Habit",
          ...dayLabels.map((l) => {
            const d = l.date;
            return d.toLocaleDateString("en-US", {
              month: "short",
              day: "numeric",
            });
          }),
          "Completion Rate",
        ];

        const rows = tasks.map((task) => {
          const pct = calcPct(task);
          const dayCells = task.days.map((d) =>
            d === true ? "✓" : d === false ? "✗" : "",
          );
          return [task.name, ...dayCells, pct + "%"];
        });

        // Summary row
        const summaryRow = ["TOTAL DAYS LOGGED"];
        for (let d = 0; d < DAYS; d++) {
          const logged = tasks.filter((t) => t.days[d] !== null).length;
          summaryRow.push(logged > 0 ? logged + " habits" : "");
        }
        summaryRow.push("");

        const doneRow = ["COMPLETED"];
        for (let d = 0; d < DAYS; d++) {
          const done = tasks.filter((t) => t.days[d] === true).length;
          doneRow.push(done > 0 ? done : "");
        }
        doneRow.push("");

        const sheetData = [header, ...rows, [], summaryRow, doneRow];
        const ws = XLSX.utils.aoa_to_sheet(sheetData);

        // Column widths
        ws["!cols"] = [
          { wch: 20 },
          ...Array(DAYS).fill({ wch: 6 }),
          { wch: 16 },
        ];

        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Habit Tracker");

        const filename =
          "habit_tracker_" + new Date().toISOString().slice(0, 10) + ".xlsx";
        XLSX.writeFile(wb, filename);
        showToast("📊 Excel file downloaded!");
      }

      document.getElementById("task-input").addEventListener("keydown", (e) => {
        if (e.key === "Enter") addTask();
      });

      // Init
      dayLabels = getDayLabels();
      loadData();
      setDateRange();
      renderHead();
      renderBody();
      updateSaveInfo();
    </script>
  </body>
</html>
